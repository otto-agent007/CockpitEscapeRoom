  source_type: wikimedia_commons_photo
  creator: Cory W. Watts
  license: CC BY-SA 2.0
  aircraft:
    manufacturer: McDonnell Douglas
    model: DC-9
    variant: DC-9-51
    operator: Northwest Airlines
    registration: N775NC
  era: Photographed 2008; aircraft manufactured 1979
  viewpoint: flight deck forward, captain/center perspective
  classification: primary
  confidence: high
  target_compatibility: Primary target match for Northwest DC-9-51 cockpit layout,
    material family, yokes, main-panel density, glare shield, and windshield relationship.
    Does not resolve overhead, pedestal, or sidewall close-up details.
  intended_uses:
  - captain-eye main panel silhouette
  - analog instrument density
  - yoke, glare shield, and windshield relationship
